name: Deploy to AWS

on:
  push:
    branches: [main]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Cancel in-progress runs on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  AWS_REGION: ap-southeast-2

jobs:
  # ── Job 1: Build ────────────────────────────────────────────────
  build:
    name: Build React App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_APP_ENV: production
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
          VITE_SF_BASE_URL: ${{ secrets.VITE_SF_BASE_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # Upload dist/ as artifact for the deploy job
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: dist/
          retention-days: 7

  # ── Job 2: Deploy ───────────────────────────────────────────────
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    environment: production   # Requires manual approval if configured

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync static assets to S3 (immutable cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"

      - name: Output deployment URL
        run: |
          echo "### Deployment complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** production" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** ${{ secrets.S3_BUCKET }}" >> $GITHUB_STEP_SUMMARY
          echo "**CloudFront:** ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
